<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Hospitals Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; overflow: hidden; }
  
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 60px; }
  
  #controls { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: rgba(20,20,20,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 16px; z-index: 1000; overflow-x: auto; }
  
  .filter-btn { padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #888; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
  .filter-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .filter-btn.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3); box-shadow: 0 0 10px rgba(255,255,255,0.05); }
  .filter-btn[data-type="public"].active { border-color: #FFD60A; box-shadow: 0 0 12px rgba(255,214,10,0.15); }
  .filter-btn[data-type="private"].active { border-color: #FF3B30; box-shadow: 0 0 12px rgba(255,59,48,0.15); }
  .filter-btn[data-type="unknown"].active { border-color: #8E8E93; }
  .filter-btn[data-type="mental"].active { border-color: #AF52DE; }
  .filter-btn[data-type="all"] { border-left: 3px solid transparent; }
  .filter-btn[data-type="public"] { border-left: 3px solid #FFD60A; color: #ccc; }
  .filter-btn[data-type="private"] { border-left: 3px solid #FF3B30; }
  .filter-btn[data-type="unknown"] { border-left: 3px solid #8E8E93; }
  .filter-btn[data-type="mental"] { border-left: 3px solid #AF52DE; }

  .stat { color: #555; font-size: 11px; white-space: nowrap; }

  #loading { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #0f0f0f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #FFD60A; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: #888; font-size: 14px; }
  #loading .sub { color: #555; font-size: 12px; margin-top: 4px; }
  #loading .progress { color: #666; font-size: 12px; margin-top: 8px; }

  .hospital-popup { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .hospital-popup h3 { margin: 0 0 4px; font-size: 15px; color: #1a1a1a; max-width: 260px; }
  .hospital-popup .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; color: #fff; margin-top: 4px; }
  .tag.public { background: #FFD60A; color: #1a1a1a; }
  .tag.private { background: #FF3B30; }
  .tag.unknown { background: #8E8E93; }
  .tag.mental { background: #AF52DE; }
  .hospital-popup .detail { font-size: 12px; color: #666; margin-top: 2px; }
  .hospital-popup .flag { font-size: 14px; margin-right: 4px; }

  #legend { position: absolute; top: 20px; right: 20px; background: rgba(20,20,20,0.9); backdrop-filter: blur(12px); border-radius: 12px; padding: 14px 18px; border: 1px solid rgba(255,255,255,0.08); z-index: 1000; font-size: 12px; min-width: 130px; }
  #legend .item { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
  #legend .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  #title { position: absolute; top: 20px; left: 20px; z-index: 1000; }
  #title h1 { font-size: 20px; font-weight: 700; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
  #title p { font-size: 12px; color: rgba(255,255,255,0.6); }

  #search { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 300px; max-width: 80vw; }
  #search-input { width: 100%; padding: 10px 16px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); background: rgba(20,20,20,0.9); backdrop-filter: blur(12px); color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
  #search-input:focus { border-color: rgba(255,255,255,0.3); }
  #search-input::placeholder { color: #666; }

  @media (max-width: 640px) {
    #title h1 { font-size: 16px; }
    #controls { gap: 5px; padding: 8px; flex-wrap: wrap; height: auto; }
    .filter-btn { font-size: 10px; padding: 5px 8px; }
    #legend { top: 75px; right: 10px; padding: 10px 12px; font-size: 11px; }
    #search { top: 65px; width: 200px; }
    #title { top: 10px; left: 10px; }
    #title h1 { font-size: 15px; }
    #title p { display: none; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading hospitals across 5 countries...</p>
  <div class="sub">Querying Wikidata for UK, Ireland, Spain, USA & Australia</div>
  <div class="progress" id="load-progress">Fetching data...</div>
</div>

<div id="title">
  <h1>🏥 Global Hospital Map</h1>
  <p>Public vs Private · 5 countries</p>
</div>

<div id="search"><input id="search-input" type="text" placeholder="Search hospitals..." /></div>

<div id="map"></div>

<div id="legend">
  <div class="item"><div class="dot" style="background:#FFD60A"></div> Public</div>
  <div class="item"><div class="dot" style="background:#FF3B30"></div> Private</div>
  <div class="item"><div class="dot" style="background:#8E8E93"></div> Unknown</div>
  <div class="item"><div class="dot" style="background:#AF52DE"></div> Mental health</div>
</div>

<div id="controls">
  <button class="filter-btn active" data-type="all" onclick="setFilter('all')">All <span id="count-all">0</span></button>
  <button class="filter-btn" data-type="public" onclick="setFilter('public')">🟡 Public <span id="count-public">0</span></button>
  <button class="filter-btn" data-type="private" onclick="setFilter('private')">🔴 Private <span id="count-private">0</span></button>
  <button class="filter-btn" data-type="unknown" onclick="setFilter('unknown')">⚪ Unknown <span id="count-unknown">0</span></button>
  <button class="filter-btn active" data-type="mental" onclick="toggleMental()">🧠 Mental <span id="count-mental">0</span></button>
  <span class="stat">Data: <span>Wikidata</span></span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
let map, allHospitals = [], markerCluster, showMental = true;
let currentTypeFilter = 'all';

const WIKIDATA_URL = 'https://query.wikidata.org/sparql';

const COUNTRY_FLAGS = {
  'United Kingdom': '🇬🇧', 'Ireland': '🇮🇪', 'Spain': '🇪🇸',
  'United States': '🇺🇸', 'Australia': '🇦🇺'
};

// Country Q-IDs
const COUNTRIES = ['wd:Q145', 'wd:Q27', 'wd:Q29', 'wd:Q30', 'wd:Q408'];

function getColor(type) {
  switch(type) {
    case 'public': return { fill: '#FFD60A', border: '#D4B40A' };
    case 'private': return { fill: '#FF3B30', border: '#D32F26' };
    default: return { fill: '#8E8E93', border: '#707075' };
  }
}

function createIcon(type, mental) {
  const c = getColor(type);
  const inner = mental
    ? `<div style="width:12px;height:12px;border-radius:50%;background:${c.fill};border:2px solid #AF52DE;box-shadow:0 0 6px ${c.fill}66;"></div>`
    : `<div style="width:12px;height:12px;border-radius:50%;background:${c.fill};border:2px solid ${c.border};box-shadow:0 0 6px ${c.fill}66;"></div>`;
  return L.divIcon({ className: '', html: inner, iconSize: [12,12], iconAnchor: [6,6], popupAnchor: [0,-8] });
}

function makePopup(h) {
  const flag = COUNTRY_FLAGS[h.countryRaw] || '';
  let html = `<div class="hospital-popup"><h3>${flag} ${h.name}</h3>`;
  html += `<span class="tag ${h.type}">${h.type[0].toUpperCase() + h.type.slice(1)}</span>`;
  if (h.mental) html += ` <span class="tag mental">🧠 Mental Health</span>`;
  if (h.operator) html += `<div class="detail">🏢 ${h.operator}</div>`;
  if (h.countryRaw) html += `<div class="detail">📍 ${h.countryRaw}</div>`;
  if (h.beds) html += `<div class="detail">🛏️ ${h.beds} beds</div>`;
  html += `</div>`;
  return html;
}

// ── Classification ──

function classify(name, operator, country) {
  const n = (name || '').toLowerCase();
  const op = (operator || '').toLowerCase();

  // Common public signals (any country)
  if (op.includes('nhs') || op.includes('health service') || op.includes('hse') ||
      op.includes('health board') || op.includes('trust') || op.includes('hsc') ||
      op.includes('foundation trust') || op.includes('national health') ||
      op.includes('servicio de salud') || op.includes('sistema nacional') ||
      op.includes('ministry of health') || op.includes('department of health') ||
      op.includes('health and social care') || op.includes('veterans affairs') ||
      op.includes('va ') || op.includes('public health') ||
      op.includes('county health') || op.includes('state health') ||
      op.includes('army') || op.includes('navy') || op.includes('air force') ||
      op.includes('military') || op.includes('government') ||
      op.includes('department of veterans')) {
    return 'public';
  }

  // Private signals
  if (op.includes('private') || op.includes('ltd') || op.includes('limited') ||
      op.includes('plc') || op.includes('inc.') || op.includes('corporation') ||
      op.includes('hca healthcare') || op.includes('tenet') || op.includes('community health systems') ||
      op === 'nuffield health' || op === 'spire healthcare' || op === 'circle health' ||
      op === 'bmi healthcare' || op === 'ramsay health care' || op === 'quiron' ||
      op === 'hospitales universitarios') {
    return 'private';
  }

  // Name-based
  if (n.includes('nhs ')) return 'public';
  if (n.startsWith('royal ') || n.includes('royal hospital') || n.includes('royal infirmary') ||
      n.includes('university hospital') || n.includes('teaching hospital')) return 'public';
  if (n.includes('private') || n.includes('independent hospital') || n.includes('clínica')) return 'private';

  // Irish specific
  const iePublic = [
    'beaumont', 'st. james', 'mater misericordiae', 'st. vincent', 'tallaght',
    'cork university', 'galway university', 'connolly', 'mercy university',
    'letterkenny', 'sligo university', 'waterford university', 'portiuncula',
    'mayo university', 'naas general', 'wexford general', 'cavan general',
    'louth county', 'our lady of lourdes', 'st. luke', 'bantry general',
    'mallow general', 'south infirmary', 'tipperary university',
    'midland regional', 'national maternity', 'coombe', 'rotunda',
    'children\'s health ireland', 'temple street', 'crumlin'
  ];
  if (iePublic.some(k => n.includes(k))) return 'public';

  // Spanish specific (mostly public by default in NHS)
  const esPublic = [
    'hospital universitario', 'hospital general', 'hospital clínico',
    'hospital regional', 'hospital comarcal', 'hospital de la',
    'hospital virgen', 'hospital san', 'hospital santa',
    'complejo hospitalario', 'área sanitaria', 'servicio de salud'
  ];
  if (country === 'Spain') {
    if (esPublic.some(k => n.includes(k))) return 'public';
    // Most Spanish hospitals are public unless named private
    if (!n.includes('clínica') && !n.includes('privado')) return 'public';
  }

  // Australian specific
  const auPublic = ['royal', 'hospital', 'health service', 'health district',
    'prince of wales', 'st george', 'westmead', 'alice springs'];
  if (country === 'Australia' && auPublic.some(k => n.includes(k))) return 'public';

  // USA - name-based public signals  
  if (country === 'United States') {
    if (n.includes('veterans') || n.includes('va ') || n.includes('memorial') ||
        n.includes('county hospital') || n.includes('state hospital') ||
        n.includes('general hospital') || n.includes('university of') ||
        n.includes('medical center') || n.startsWith('st. ') || n.startsWith('st ')) {
      return 'public';
    }
  }

  return 'unknown';
}

function isMental(name) {
  const n = (name || '').toLowerCase();
  const keywords = ['psychiatric', 'mental health', 'psychiatry', 'mental hospital',
    'mental health centre', 'psychiatric unit', 'mental', 'psiquiátrico',
    'salud mental', 'behavioural health', 'behavioral health'];
  return keywords.some(k => n.includes(k));
}

// ── Wikidata fetch ──

function fetchHospitals() {
  const countryList = COUNTRIES.join(', ');
  const sparql = `SELECT ?hospital ?hospitalLabel ?coord ?operatorLabel ?countryLabel ?beds WHERE {
  ?hospital wdt:P31 wd:Q16917;
            wdt:P625 ?coord;
            wdt:P17 ?country.
  FILTER(?country IN (${countryList}))
  OPTIONAL { ?hospital wdt:P137 ?operator. }
  OPTIONAL { ?hospital wdt:P1313 ?beds. }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
}
LIMIT 10000`;

  document.getElementById('load-progress').textContent = 'Querying Wikidata...';

  fetch(WIKIDATA_URL + '?format=json&query=' + encodeURIComponent(sparql), {
    headers: { 'Accept': 'application/json', 'User-Agent': 'HospitalMap/1.0' }
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById('load-progress').textContent = `Processing ${data.results.bindings.length} records...`;
    const parsed = data.results.bindings.map(b => {
      const coordStr = b.coord.value;
      const match = coordStr.match(/Point\(([\d.-]+)\s+([\d.-]+)\)/);
      if (!match) return null;
      const lon = parseFloat(match[1]);
      const lat = parseFloat(match[2]);
      if (isNaN(lat) || isNaN(lon)) return null;
      const name = b.hospitalLabel.value;
      const operator = b.operatorLabel ? b.operatorLabel.value : '';
      const countryRaw = b.countryLabel.value;
      const beds = b.beds ? parseInt(b.beds.value) : 0;
      const type = classify(name, operator, countryRaw);
      const mental = isMental(name);
      return { name, lat, lng: lon, type, mental, operator, beds, countryRaw };
    }).filter(Boolean);

    allHospitals = parsed;

    // Show counts by country
    const byCountry = {};
    parsed.forEach(h => { byCountry[h.countryRaw] = (byCountry[h.countryRaw] || 0) + 1; });
    document.getElementById('load-progress').textContent = Object.entries(byCountry)
      .map(([c, n]) => `${COUNTRY_FLAGS[c] || c} ${n}`).join(' · ');

    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      renderAll();
    }, 500);
  })
  .catch(err => {
    document.getElementById('load-progress').textContent = `⚠ Error: ${err.message}`;
  });
}

// ── Map init ──

function initMap() {
  map = L.map('map', {
    center: [30, -30],
    zoom: 3,
    minZoom: 2,
    worldCopyJump: true,
    zoomControl: false
  });
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  markerCluster = L.markerClusterGroup({
    chunkedLoading: true,
    maxClusterRadius: 55,
    spiderfyOnMaxZoom: true,
    disableClusteringAtZoom: 15,
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      const r = Math.min(45, 24 + Math.min(count, 30) * 0.7);
      return L.divIcon({
        html: `<div style="background:rgba(255,214,10,0.15);border:2px solid rgba(255,214,10,0.5);border-radius:50%;width:${r}px;height:${r}px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:${count > 99 ? 10 : 12}px;backdrop-filter:blur(4px);">${count}</div>`,
        className: '',
        iconSize: [r, r]
      });
    }
  });
  map.addLayer(markerCluster);
}

// ── Rendering ──

function renderAll() {
  const counts = { public: 0, private: 0, unknown: 0, mental: 0 };
  allHospitals.forEach(h => { counts[h.type]++; if (h.mental) counts.mental++; });

  document.getElementById('count-all').textContent = allHospitals.length;
  document.getElementById('count-public').textContent = counts.public;
  document.getElementById('count-private').textContent = counts.private;
  document.getElementById('count-unknown').textContent = counts.unknown;
  document.getElementById('count-mental').textContent = counts.mental;

  applyFilter();
}

function applyFilter() {
  markerCluster.clearLayers();

  allHospitals.forEach(h => {
    const typeMatch = currentTypeFilter === 'all' || h.type === currentTypeFilter;
    if (!typeMatch) return;
    if (!showMental && h.mental) return;

    const marker = L.marker([h.lat, h.lng], { icon: createIcon(h.type, h.mental) });
    marker.bindPopup(makePopup(h));
    markerCluster.addLayer(marker);
  });
}

function setFilter(type) {
  currentTypeFilter = type;
  // Update button states
  document.querySelectorAll('.filter-btn[data-type]').forEach(btn => {
    if (btn.dataset.type === type) btn.classList.add('active');
    else if (btn.dataset.type !== 'mental') btn.classList.remove('active');
  });
  applyFilter();
}

function toggleMental() {
  showMental = !showMental;
  document.querySelector('.filter-btn[data-type="mental"]').classList.toggle('active');
  applyFilter();
}

// ── Search ──

document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { applyFilter(); return; }
  markerCluster.clearLayers();
  allHospitals.filter(h => h.name.toLowerCase().includes(q)).forEach(h => {
    const marker = L.marker([h.lat, h.lng], { icon: createIcon(h.type, h.mental) });
    marker.bindPopup(makePopup(h));
    markerCluster.addLayer(marker);
  });
});

// ── Start ──

initMap();
fetchHospitals();
</script>
</body>
</html>
